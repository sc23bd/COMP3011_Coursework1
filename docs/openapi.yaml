components:
  schemas:
    elo.Methodology:
      properties:
        formulaReference:
          type: string
        homeAdvantage:
          type: number
        kFactor:
          type: number
        weightMultiplier:
          type: number
      type: object
    elo.RankingEntry:
      properties:
        elo:
          type: number
        links:
          items:
            $ref: '#/components/schemas/models.Link'
          type: array
          uniqueItems: false
        rank:
          type: integer
        teamId:
          type: integer
        teamName:
          type: string
      type: object
    elo.RankingsResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/elo.RankingEntry'
          type: array
          uniqueItems: false
        date:
          type: string
        limit:
          type: integer
        links:
          items:
            $ref: '#/components/schemas/models.Link'
          type: array
          uniqueItems: false
        offset:
          type: integer
        total:
          type: integer
      type: object
    elo.Rating:
      properties:
        changeFromPrevious:
          type: number
        date:
          type: string
        elo:
          type: number
        links:
          items:
            $ref: '#/components/schemas/models.Link'
          type: array
          uniqueItems: false
        matchesConsidered:
          type: integer
        methodology:
          $ref: '#/components/schemas/elo.Methodology'
        rank:
          type: integer
        teamId:
          type: integer
        teamName:
          type: string
      type: object
    elo.RecalculateResponse:
      properties:
        links:
          items:
            $ref: '#/components/schemas/models.Link'
          type: array
          uniqueItems: false
        message:
          type: string
      type: object
    elo.TimelineEntry:
      properties:
        change:
          type: number
        date:
          type: string
        elo:
          type: number
        homeAway:
          description: '"H", "A", or "N"'
          type: string
        matchId:
          type: integer
        opponent:
          type: string
        result:
          description: '"W", "D", or "L"'
          type: string
      type: object
    elo.TimelineResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/elo.TimelineEntry'
          type: array
          uniqueItems: false
        links:
          items:
            $ref: '#/components/schemas/models.Link'
          type: array
          uniqueItems: false
        teamId:
          type: integer
        teamName:
          type: string
      type: object
    models.CreateGoalRequest:
      properties:
        ownGoal:
          type: boolean
        penalty:
          type: boolean
        scorer:
          maxLength: 100
          minLength: 1
          type: string
        teamId:
          minimum: 1
          type: integer
      required:
      - scorer
      - teamId
      type: object
    models.CreateMatchRequest:
      properties:
        awayScore:
          minimum: 0
          type: integer
        awayTeamId:
          minimum: 1
          type: integer
        city:
          type: string
        country:
          type: string
        date:
          type: string
        homeScore:
          minimum: 0
          type: integer
        homeTeamId:
          minimum: 1
          type: integer
        neutral:
          type: boolean
        tournamentId:
          minimum: 1
          type: integer
      required:
      - awayTeamId
      - date
      - homeTeamId
      - tournamentId
      type: object
    models.CreateShootoutRequest:
      properties:
        winnerId:
          minimum: 1
          type: integer
      required:
      - winnerId
      type: object
    models.CreateTeamRequest:
      properties:
        name:
          maxLength: 100
          minLength: 1
          type: string
      required:
      - name
      type: object
    models.ErrorResponse:
      properties:
        error:
          type: string
      type: object
    models.FormerName:
      properties:
        endDate:
          type: string
        formerName:
          type: string
        id:
          type: integer
        startDate:
          type: string
        teamId:
          type: integer
      type: object
    models.FormerNamesResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/models.FormerName'
          type: array
          uniqueItems: false
        links:
          items:
            $ref: '#/components/schemas/models.Link'
          type: array
          uniqueItems: false
      type: object
    models.Goal:
      properties:
        id:
          type: integer
        matchId:
          type: integer
        ownGoal:
          type: boolean
        penalty:
          type: boolean
        scorer:
          type: string
        team:
          type: string
        teamId:
          type: integer
      type: object
    models.GoalsResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/models.Goal'
          type: array
          uniqueItems: false
        links:
          items:
            $ref: '#/components/schemas/models.Link'
          type: array
          uniqueItems: false
      type: object
    models.Link:
      properties:
        href:
          type: string
        method:
          type: string
        rel:
          type: string
      type: object
    models.LoginRequest:
      properties:
        password:
          type: string
        username:
          type: string
      required:
      - password
      - username
      type: object
    models.LoginResponse:
      properties:
        links:
          items:
            $ref: '#/components/schemas/models.Link'
          type: array
          uniqueItems: false
        token:
          type: string
      type: object
    models.MatchResponse:
      properties:
        awayScore:
          type: integer
        awayTeam:
          type: string
        awayTeamId:
          type: integer
        city:
          type: string
        country:
          type: string
        date:
          type: string
        homeScore:
          type: integer
        homeTeam:
          type: string
        homeTeamId:
          type: integer
        id:
          type: integer
        links:
          items:
            $ref: '#/components/schemas/models.Link'
          type: array
          uniqueItems: false
        neutral:
          type: boolean
        tournament:
          type: string
        tournamentId:
          type: integer
      type: object
    models.MatchesResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/models.MatchResponse'
          type: array
          uniqueItems: false
        links:
          items:
            $ref: '#/components/schemas/models.Link'
          type: array
          uniqueItems: false
      type: object
    models.RegisterRequest:
      properties:
        password:
          maxLength: 128
          minLength: 8
          type: string
        username:
          maxLength: 50
          minLength: 3
          type: string
      required:
      - password
      - username
      type: object
    models.ShootoutResponse:
      properties:
        id:
          type: integer
        links:
          items:
            $ref: '#/components/schemas/models.Link'
          type: array
          uniqueItems: false
        matchId:
          type: integer
        winner:
          type: string
        winnerId:
          type: integer
      type: object
    models.TeamResponse:
      properties:
        createdAt:
          type: string
        id:
          type: integer
        links:
          items:
            $ref: '#/components/schemas/models.Link'
          type: array
          uniqueItems: false
        name:
          type: string
      type: object
    models.TeamsResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/models.TeamResponse'
          type: array
          uniqueItems: false
        links:
          items:
            $ref: '#/components/schemas/models.Link'
          type: array
          uniqueItems: false
      type: object
    models.Tournament:
      properties:
        createdAt:
          type: string
        id:
          type: integer
        name:
          type: string
      type: object
    models.TournamentsResponse:
      properties:
        data:
          items:
            $ref: '#/components/schemas/models.Tournament'
          type: array
          uniqueItems: false
      type: object
    models.UpdateMatchRequest:
      properties:
        awayScore:
          minimum: 0
          type: integer
        awayTeamId:
          minimum: 1
          type: integer
        city:
          type: string
        country:
          type: string
        date:
          type: string
        homeScore:
          minimum: 0
          type: integer
        homeTeamId:
          minimum: 1
          type: integer
        neutral:
          type: boolean
        tournamentId:
          minimum: 1
          type: integer
      required:
      - awayTeamId
      - date
      - homeTeamId
      - tournamentId
      type: object
    models.UpdateTeamRequest:
      properties:
        name:
          maxLength: 100
          minLength: 1
          type: string
      required:
      - name
      type: object
  securitySchemes:
    Bearer:
      description: Type "Bearer" followed by a space and JWT token.
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  contact:
    email: support@example.com
    name: API Support
  description: REST API for football match and team data with HATEOAS and JWT authentication
  license:
    name: MIT
    url: http://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Football API
  version: "1.0"
openapi: 3.1.0
paths:
  /auth/login:
    post:
      description: Authenticate user and return JWT token
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/models.LoginRequest'
                description: User login credentials
                summary: request
        description: User login credentials
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.LoginResponse'
          description: Login successful
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid credentials
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      summary: User login
      tags:
      - auth
  /auth/register:
    post:
      description: Create a new user account with username and password
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/models.RegisterRequest'
                description: User registration details
                summary: request
        description: User registration details
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                additionalProperties: {}
                type: object
          description: User created successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid request
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Username already exists
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      summary: Register a new user
      tags:
      - auth
  /football/head-to-head:
    get:
      description: Get all matches between two specific teams
      parameters:
      - description: First team ID
        in: query
        name: teamA
        required: true
        schema:
          type: integer
      - description: Second team ID
        in: query
        name: teamB
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.MatchesResponse'
          description: Head-to-head matches
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid query parameters
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      summary: Get head-to-head matches
      tags:
      - matches
  /football/matches:
    get:
      description: Get all matches with pagination support
      parameters:
      - description: Number of results per page
        in: query
        name: limit
        schema:
          default: 50
          type: integer
      - description: Offset for pagination
        in: query
        name: offset
        schema:
          default: 0
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.MatchesResponse'
          description: List of matches
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid query parameters
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      summary: List all matches
      tags:
      - matches
    post:
      description: Create a new match result (requires authentication)
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/models.CreateMatchRequest'
                description: Match details
                summary: request
        description: Match details
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.MatchResponse'
          description: Match created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Unauthorized
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Match already exists
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      security:
      - Bearer: []
      summary: Create a new match
      tags:
      - matches
  /football/matches/{id}:
    delete:
      description: Delete a match by ID (requires authentication)
      parameters:
      - description: Match ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "204":
          description: Match deleted successfully
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid match ID
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Match not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      security:
      - Bearer: []
      summary: Delete a match
      tags:
      - matches
    get:
      description: Get detailed information about a specific match
      parameters:
      - description: Match ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.MatchResponse'
          description: Match details
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid match ID
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Match not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      summary: Get a match by ID
      tags:
      - matches
    put:
      description: Update an existing match record (requires authentication)
      parameters:
      - description: Match ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/models.UpdateMatchRequest'
                description: Updated match details
                summary: request
        description: Updated match details
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.MatchResponse'
          description: Match updated
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Match not found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Match already exists
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      security:
      - Bearer: []
      summary: Update a match
      tags:
      - matches
  /football/matches/{id}/goals:
    get:
      description: Get all goals scored in the specified match
      parameters:
      - description: Match ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.GoalsResponse'
          description: List of goals
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid match ID
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Match not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      summary: Get goals for a match
      tags:
      - goals
    post:
      description: Record a new goal for a match
      parameters:
      - description: Match ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/models.CreateGoalRequest'
                description: Goal details
                summary: goal
        description: Goal details
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.GoalsResponse'
          description: Single created goal wrapped in a GoalsResponse collection
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid input
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Match or team not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      security:
      - Bearer: []
      summary: Create a goal
      tags:
      - goals
  /football/matches/{id}/goals/{goalId}:
    delete:
      description: Remove a goal record from a match
      parameters:
      - description: Match ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      - description: Goal ID
        in: path
        name: goalId
        required: true
        schema:
          type: integer
      responses:
        "204":
          description: Goal deleted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid ID
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Goal not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      security:
      - Bearer: []
      summary: Delete a goal
      tags:
      - goals
  /football/matches/{id}/shootout:
    delete:
      description: Remove a penalty shootout record from a match
      parameters:
      - description: Match ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "204":
          description: Shootout deleted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid match ID
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Shootout not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      security:
      - Bearer: []
      summary: Delete a shootout
      tags:
      - shootouts
    get:
      description: Get the penalty shootout result for a match
      parameters:
      - description: Match ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ShootoutResponse'
          description: Shootout result
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid match ID
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Match or shootout not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      summary: Get shootout result
      tags:
      - shootouts
    post:
      description: Record a penalty shootout result for a match
      parameters:
      - description: Match ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/models.CreateShootoutRequest'
                description: Shootout details
                summary: shootout
        description: Shootout details
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ShootoutResponse'
          description: Shootout created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid input
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Match or team not found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Shootout already exists
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      security:
      - Bearer: []
      summary: Create a shootout
      tags:
      - shootouts
  /football/players/{name}/goals:
    get:
      description: Get all goals scored by a specific player
      parameters:
      - description: Player name
        in: path
        name: name
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.GoalsResponse'
          description: List of goals
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Invalid player name
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/models.ErrorResponse'
          description: Internal server error
      summary: Get goals by player
      tags:
      - players
  /football/rankings/elo:
    get:
      description: Returns a paginated snapshot of global Elo rankings, optionally
        filtered by region
      parameters:
      - description: Point-in-time date (YYYY-MM-DD)
        in: query
        name: date
        schema:
          type: string
